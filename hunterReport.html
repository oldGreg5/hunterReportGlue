<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter Report</title>
  <link rel="stylesheet" type="text/css" href="hunterReport.css">
</head>
<header id="header">
  <!-- <img id="header-img" src="https://www.logolynx.com/images/logolynx/d7/d7e640a486e20915b5bb035fc7a7e922.jpeg"> -->
</header>

<body onload="loadDescriptionFileHelper()">
  <main>
    <h1>Hunter Report Generator</h1>

    <div class="layout-container">
      <div class="left-column">
        <div class="search-container">
          <textarea id="searchBox" placeholder="Search items... (Paste list here)" class="search-input"></textarea>
          <span class="search-clear" id="searchClear">×</span>
        </div>

        <div class="button-group">
          <button id="ctaCombineText" type="button" name="button" onclick="combineDescription()">Generate</button>
        </div>

        <div class="textarea-container">
          <textarea id="combinedText" placeholder="Your generated report will appear here..."></textarea>
        </div>

        <div id="about" class="about-section">
          <h2>Daily teaser</h2>
          <p></p>
        </div>
      </div>

      <div class="right-column">
        <div id="descriptionsTable" class="boxes-table">
          <!-- Dynamic content will be loaded here -->
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2023 Hunter Report Generator | v0.3</p>
  </footer>

  <!-- <script data-main="scripts/hunterReport" src="scripts/require.js"></script> -->
  <script src="./scripts/bundle.js"></script>
  <!-- <script src="htmlRouter.js"></script> -->
  <!-- <script src="scripts/hunterReport.js"></script> -->
</body>
</html>
