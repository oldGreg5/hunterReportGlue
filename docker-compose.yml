version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: oldgreg5/hunter-report-glue:latest
    container_name: hunter-report-glue
    restart: unless-stopped
    ports:
      - '8089:8089'
    volumes:
      - ./data:/usr/src/app/data
    environment:
      - NODE_ENV=production
    networks:
      - hunter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8089/hunterReport"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  hunter-network:
    driver: bridge
